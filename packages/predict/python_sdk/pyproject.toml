[project]
name = "deepbook-predict-sdk"
version = "0.1.0"
description = "Python SDK and CLI for the DeepBook Predict protocol"
requires-python = ">=3.9"
dependencies = ["pynacl>=1.5"]

[project.optional-dependencies]
tui = ["textual>=0.50"]

[project.scripts]
predict-sdk = "predict_sdk.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Distribution name (deepbook-predict-sdk) differs from the import package, so
# point hatchling at the package explicitly.
packages = ["predict_sdk"]

[tool.hatch.build.targets.wheel.force-include]
# Bundle the canonical deployment manifest into the package so installed wheels
# carry the wiring; in-repo/editable runs read the repo artifact directly
# (see config.load_testnet_config). This keeps a single source of deployment truth.
"../deployment/deployment.testnet.json" = "predict_sdk/deployments/testnet.json"
