[project]
name = "deepbook-predict-sdk"
version = "0.1.0"
description = "Read-only observability client for the DeepBook Predict protocol"
requires-python = ">=3.9"
dependencies = []

# The read/observability path is pure-stdlib. Transaction signing needs Ed25519,
# so the write path (signer/tx/actions) requires the optional `tx` extra.
[project.optional-dependencies]
tx = ["pynacl>=1.5"]

[project.scripts]
predict-sdk = "predict_sdk.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Distribution name (deepbook-predict-sdk) differs from the import package, so
# point hatchling at the package explicitly.
packages = ["predict_sdk"]
