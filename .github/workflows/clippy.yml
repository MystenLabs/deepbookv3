name: Clippy

on:
  push:
    branches: ["main"]
    paths:
      - crates/**
      - Cargo.lock
      - Cargo.toml
  pull_request:
    branches: ["main"]
    paths:
      - crates/**
      - Cargo.lock
      - Cargo.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@clippy-sarif
      - name: Install postgres
        shell: bash
        run: |
          sudo apt update && sudo apt install postgresql

      - name: Add postgres to PATH
        run: echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH

      - name: Run clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Clippy found warnings or errors"
            exit 1
          fi
