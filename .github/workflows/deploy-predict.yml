name: Deploy Predict

on:
  push:
    branches: ["main"]
    paths:
      - packages/predict/**
      - crates/predict-*/**
      - docker/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Indexer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/predict-indexer/Dockerfile
          push: true
          tags: mysten/predict-indexer:latest

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/predict-server/Dockerfile
          push: true
          tags: mysten/predict-server:latest

      - name: Build and push Oracle Feed
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/oracle-feed/Dockerfile
          push: true
          tags: mysten/predict-oracle-feed:latest
