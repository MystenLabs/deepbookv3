name: Move Test CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "packages/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SUI_VERSION: testnet-v1.74.0

jobs:
  predict-algebra-proofs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run source-pinned Predict algebra proofs
        working-directory: packages/predict/simulations
        run: python3 -m unittest discover -v -s . -p "test_*.py"

  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Sui CLI
        run: |
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz" \
            | sudo tar -xz -C /usr/local/bin
          sui --version

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done

  test-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Sui CLI
        run: |
          if [ "$(uname -m)" = "arm64" ]; then SUFFIX="macos-arm64"; else SUFFIX="macos-x86_64"; fi
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-${SUFFIX}.tgz" \
            | tar -xz -C /usr/local/bin
          sui --version

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done
