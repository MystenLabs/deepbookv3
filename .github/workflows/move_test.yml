name: Move Test CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "packages/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SUI_VERSION: mainnet-v1.68.1

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Sui CLI
        run: |
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz" \
            | tar -xz -C /usr/local/bin

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done

  test-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Sui CLI
        run: |
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-macos-arm64.tgz" \
            | tar -xz -C /usr/local/bin

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done
