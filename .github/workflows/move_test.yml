name: Move Test CI

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "packages/**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest Sui mainnet release
        id: sui-version
        run: |
          SUI_VERSION=$(curl -sf https://api.github.com/repos/MystenLabs/sui/releases \
            | jq -r '[.[] | select(.tag_name | startswith("mainnet-v"))][0].tag_name')
          echo "version=$SUI_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Sui $SUI_VERSION"

      - name: Install Sui CLI
        run: |
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${{ steps.sui-version.outputs.version }}/sui-${{ steps.sui-version.outputs.version }}-ubuntu-x86_64.tgz" \
            | sudo tar -xz -C /usr/local/bin

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done

  test-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest Sui mainnet release
        id: sui-version
        run: |
          SUI_VERSION=$(curl -sf https://api.github.com/repos/MystenLabs/sui/releases \
            | jq -r '[.[] | select(.tag_name | startswith("mainnet-v"))][0].tag_name')
          echo "version=$SUI_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Sui $SUI_VERSION"

      - name: Install Sui CLI
        run: |
          if [ "$(uname -m)" = "arm64" ]; then SUFFIX="macos-arm64"; else SUFFIX="macos-x86_64"; fi
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/${{ steps.sui-version.outputs.version }}/sui-${{ steps.sui-version.outputs.version }}-${SUFFIX}.tgz" \
            | tar -xz -C /usr/local/bin
          sui --version

      - name: Run Move tests
        run: |
          for dir in packages/*; do
            echo "Running sui move test in $dir"
            sui move test --gas-limit 100000000000 --path "$dir"
          done
